<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading… — EndoWiki</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%238B2B2B'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='20' fill='white'%3EE%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,300;1,8..60,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" />
  <link rel="stylesheet" href="assets/styles.css" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js" defer></script>
  <script src="assets/chrome.js" defer></script>
  <script src="assets/auth.js" defer></script>
</head>
<body>

  <nav id="site-nav"></nav>

  <main id="main">
    <div class="review-page">
      <div class="loading-state" role="status" aria-live="polite">
        <div class="loading-spinner" aria-hidden="true"></div>
        <span>Loading review…</span>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-viewer.js"></script>
  <!-- Citation widget -->
  <script src="assets/cite.js"></script>

  <script>
  (function () {
    function esc(s) {
      return String(s || '').replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
    function fmtDate(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
    }
    function initials(name) {
      return String(name || '?').split(' ').map(function(w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
    }
    function starsHTML(n) {
      var r = Math.max(0, Math.min(5, Math.round(Number(n) || 0)));
      return '<span class="review-stars" aria-label="' + r + ' out of 5 stars">' +
        '★'.repeat(r) + '<span class="empty">' + '☆'.repeat(5 - r) + '</span>' +
      '</span>';
    }
    function ratingLabel(n) {
      return ['', 'Poor', 'Fair', 'Good', 'Very good', 'Excellent'][Math.round(n)] || '';
    }

    var u = new URL(location.href);
    var slug = u.searchParams.get('slug') || u.pathname.replace(/^\/r\//, '');
    var mainEl = document.getElementById('main');

    if (!slug) {
      mainEl.innerHTML = '<div class="review-page"><p>Missing review. <a href="/">← Home</a></p></div>';
      return;
    }

    // Try course then equipment
    var foundKind = null;
    var foundData = null;

    fetch('/api/get?kind=course&slug=' + encodeURIComponent(slug))
      .then(function(res) {
        if (res.ok) { foundKind = 'course'; return res.json(); }
        return fetch('/api/get?kind=equipment&slug=' + encodeURIComponent(slug))
          .then(function(res2) {
            if (res2.ok) { foundKind = 'equipment'; return res2.json(); }
            throw { notFound: true };
          });
      })
      .then(function(r) {
        var kind = foundKind;
        document.title = r.title + ' — EndoWiki';

        // Build facts
        var factDefs = kind === 'course'
          ? [['Provider', r.provider], ['Instructor', r.instructor], ['Location', r.location],
             ['Format', r.format], ['Duration', r.duration], ['Price', r.price]]
          : [['Brand', r.brand], ['Model', r.model], ['Category', r.category],
             ['Price', r.price], ['Used for', r.duration_used]];

        var factsHTML = factDefs
          .filter(function(pair) { return pair[1] && String(pair[1]).trim(); })
          .map(function(pair) {
            return '<div><span class="fact-k">' + esc(pair[0]) + '</span>' +
                   '<span class="fact-v">' + esc(pair[1]) + '</span></div>';
          }).join('');

        // Build pros/cons
        var pros = (r.pros || []).map(function(p) { return '<li>' + esc(p) + '</li>'; }).join('');
        var cons = (r.cons || []).map(function(c) { return '<li>' + esc(c) + '</li>'; }).join('');

        // Verdict
        var rec = r.would_recommend;
        var verdictCls = 'mixed', verdictLabel = 'Verdict';
        if (rec === 'yes' || rec === true)  { verdictCls = 'yes';  verdictLabel = 'Recommended'; }
        if (rec === 'no'  || rec === false) { verdictCls = 'no';   verdictLabel = 'Not recommended'; }
        var verdictText = r.verdict || (verdictCls === 'yes' ? 'Would recommend.' : verdictCls === 'no' ? 'Would not recommend.' : 'Mixed — see pros and cons.');

        // Kind badge label
        var kindLabel = kind === 'course' ? 'Course review' : 'Equipment review';
        var sectionHref = kind === 'course' ? '/#courses' : '/#equipment';

        mainEl.innerHTML =
          '<div class="review-page">' +

            // Breadcrumb
            '<nav class="breadcrumb" aria-label="Breadcrumb">' +
              '<a href="/">EndoWiki</a>' +
              '<span class="sep" aria-hidden="true">›</span>' +
              '<a href="' + sectionHref + '">' + (kind === 'course' ? 'Courses' : 'Equipment') + '</a>' +
              '<span class="sep" aria-hidden="true">›</span>' +
              '<span aria-current="page">' + esc(r.title) + '</span>' +
            '</nav>' +

            // Hero card
            '<div class="review-hero-card anim-fade-up">' +
              (r.image_url
                ? '<div class="review-hero-photo"><img src="' + esc(r.image_url) + '" alt="' + esc(r.title) + '" loading="eager" /></div>'
                : '') +
              '<div class="review-hero-head">' +
                '<div style="min-width:0;">' +
                  '<span class="kind-badge ' + kind + '" style="display:inline-block;margin-bottom:10px;font-family:var(--font-ui);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:4px;">' +
                    esc(kindLabel) +
                  '</span>' +
                  '<h1 class="review-hero-title">' + esc(r.title) + '</h1>' +
                  '<div class="review-hero-byline">' +
                    '<span class="review-author-chip">' +
                      '<span style="width:20px;height:20px;border-radius:50%;background:var(--ink);color:white;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;">' +
                        esc(initials(r.author_name)) +
                      '</span>' +
                      esc(r.author_name || 'EndoWiki contributor') +
                    '</span>' +
                    (r.updated_at ? '<span>Updated ' + fmtDate(r.updated_at) + '</span>' : '') +
                  '</div>' +
                '</div>' +
                '<div class="review-stars-block">' +
                  starsHTML(r.rating) +
                  '<span class="review-rating-label">' + esc(ratingLabel(r.rating)) + '</span>' +
                '</div>' +
              '</div>' +

              // Facts
              (factsHTML ? '<div class="review-facts">' + factsHTML + '</div>' : '') +

              // Pros/cons
              ((pros || cons) ?
                '<div class="review-proscons">' +
                  '<div class="proscons-col pros">' +
                    '<h4>What works well</h4>' +
                    '<ul>' + (pros || '<li>—</li>') + '</ul>' +
                  '</div>' +
                  '<div class="proscons-col cons">' +
                    '<h4>What falls short</h4>' +
                    '<ul>' + (cons || '<li>—</li>') + '</ul>' +
                  '</div>' +
                '</div>'
              : '') +

              // Verdict
              '<div class="review-verdict ' + verdictCls + '" data-label="' + esc(verdictLabel) + '">' +
                esc(verdictText) +
              '</div>' +

            '</div>' + // /review-hero-card

            // "See all reviews of this" link (works whether or not other
            // reviews exist — subject page aggregates automatically)
            (function () {
              var subj = r.subject_slug || (r.slug || '').split('--by-')[0];
              if (!subj) return '';
              return '<div class="subject-link anim-fade-up anim-delay-2" style="margin:var(--s4) 0 var(--s5);padding:var(--s4) var(--s5);background:white;border:1px solid var(--border);border-left:3px solid var(--oxblood);border-radius:var(--r-sm);display:flex;justify-content:space-between;align-items:center;gap:var(--s3);flex-wrap:wrap;">' +
                '<span style="font-family:var(--font-ui);font-size:14px;color:var(--ink-muted);">Multiple endodontists can review the same ' + (kind === 'course' ? 'course' : 'product') + '.</span>' +
                '<a href="/p/' + esc(kind) + '/' + esc(subj) + '" style="font-family:var(--font-ui);font-size:14px;font-weight:700;color:var(--oxblood);text-decoration:none;white-space:nowrap;">' +
                'See all reviews of ' + esc(r.title.length > 40 ? r.title.slice(0, 40) + '…' : r.title) + ' →' +
                '</a>' +
              '</div>';
            })() +

            // Body
            (r.body ?
              '<div class="review-body anim-fade-up anim-delay-2">' +
                '<span class="review-body-label">Full review</span>' +
                '<div class="article-body" id="review-body-content"></div>' +
              '</div>'
            : '') +

            // Citation slot
            '<div id="cite-slot" class="anim-fade-up anim-delay-2"></div>' +

            // Footer
            '<footer style="margin-top:3em;padding-top:1.5em;border-top:1px solid var(--divider);font-family:var(--font-ui);font-size:13px;color:var(--ink-faint);">' +
              '<p>Have a different experience? <a href="compose.html?kind=' + kind + '" style="color:var(--oxblood);font-weight:600;">Write your own review →</a></p>' +
            '</footer>' +

          '</div>';

        // Render body markdown.
        // Viewer bundle renders directly into `el`; no factory()/getHTML()
        // which are only in the full editor bundle.
        if (r.body) {
          var bodyEl = document.getElementById('review-body-content');
          if (bodyEl) {
            try {
              new toastui.Editor({ el: bodyEl, initialValue: r.body });
            } catch (e) {
              console.error('Markdown render failed:', e);
              bodyEl.textContent = r.body;
            }
          }
        }

        // Render citation widget
        if (typeof renderCitation === 'function') {
          r.kind = kind;
          renderCitation(document.getElementById('cite-slot'), r, location.href);
        }
      })
      .catch(function(err) {
        var notFound = err && err.notFound;
        document.title = (notFound ? 'Not found' : 'Error') + ' — EndoWiki';
        mainEl.innerHTML =
          '<div class="review-page">' +
            '<nav class="breadcrumb"><a href="/">EndoWiki</a> <span class="sep">›</span> Reviews</nav>' +
            '<h1 class="review-hero-title" style="margin-top:var(--s6);">' +
              (notFound ? 'Review not found' : 'Something went wrong') +
            '</h1>' +
            '<p style="font-family:var(--font-body);font-size:17px;color:var(--ink-muted);">' +
              (notFound ? "This review doesn't exist yet." : esc(err.message)) +
            '</p>' +
            '<p><a href="/" style="color:var(--oxblood);">← Back to home</a></p>' +
          '</div>';
      });
  })();
  </script>

</body>
</html>
