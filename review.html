<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading… — EndoWiki</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b6fb8'/%3E%3Ctext x='50%25' y='52%25' dominant-baseline='middle' text-anchor='middle' font-family='-apple-system,Segoe UI,sans-serif' font-weight='800' font-size='18' fill='white'%3EE%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fafcff; color: #1a2330; margin: 0; line-height: 1.6; }
    .page-nav { background: white; border-bottom: 1px solid #eef2f7; padding: 14px 20px; }
    .page-nav-inner { max-width: 800px; margin: 0 auto; display: flex; align-items: center; gap: 16px; }
    .page-nav a.brand { color: #0b6fb8; text-decoration: none; font-weight: 800; }
    .page-nav .spacer { flex: 1; }
    .page-nav a { color: #5a6b80; text-decoration: none; font-size: 14px; }
    .page-nav a:hover { color: #0b6fb8; }
    main { max-width: 760px; margin: 0 auto; padding: 32px 24px 80px; }
    .review-hero {
      background: white; border: 1px solid #dde3ec; border-radius: 14px; padding: 28px;
      box-shadow: 0 1px 3px rgba(15,30,60,0.04);
    }
    .review-hero .head { display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
    .review-hero h1 { margin: 0 0 6px; font-size: 28px; line-height: 1.2; }
    .kind-tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; vertical-align: middle; margin-left: 6px; }
    .kind-tag.course { background: #eaf4fb; color: #0b6fb8; }
    .kind-tag.equipment { background: #e8f6ef; color: #2aa876; }
    .meta { color: #5a6b80; font-size: 14px; margin: 8px 0 0; }
    .stars { color: #f5a623; font-size: 28px; letter-spacing: 3px; white-space: nowrap; }
    .stars .empty { color: #e5eaf0; }
    .facts {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px 24px; margin: 22px 0 6px;
      padding: 18px 20px; background: #f7f9fc; border-radius: 10px; font-size: 14px;
    }
    .facts .k { display: block; color: #5a6b80; font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; margin-bottom: 2px; }
    .facts .v { color: #1a2330; font-weight: 500; }
    .proscons { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin: 24px 0; }
    @media (max-width: 600px) { .proscons { grid-template-columns: 1fr; } }
    .proscons .pros, .proscons .cons { background: white; border: 1px solid #e5eaf0; border-radius: 10px; padding: 14px 18px; }
    .proscons h4 { margin: 0 0 6px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
    .proscons .pros h4 { color: #1c6b45; }
    .proscons .cons h4 { color: #9c2b17; }
    .proscons ul { margin: 4px 0; padding-left: 20px; }
    .proscons li { margin: 6px 0; }
    .verdict { padding: 14px 18px; border-radius: 10px; font-size: 15px; font-weight: 500; margin-top: 20px; }
    .verdict.yes { background: #e8f6ef; color: #1c6b45; border: 1px solid #c9e8d8; }
    .verdict.no  { background: #fdeceb; color: #9c2b17; border: 1px solid #f2c4bc; }
    .verdict.mixed { background: #fdf5e7; color: #8a5a17; border: 1px solid #f0d9a8; }
    .body-host { margin-top: 32px; font-size: 17px; line-height: 1.7; }
    .body-host h2, .body-host h3 { margin-top: 1.6em; }
    .body-host img { max-width: 100%; height: auto; border-radius: 6px; }
    .author-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; background: #eaf4fb; color: #0b4d85; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .loading { text-align: center; padding: 80px 0; color: #5a6b80; }
  </style>
</head>
<body>
  <div class="page-nav">
    <div class="page-nav-inner">
      <a class="brand" href="/">EndoWiki</a>
      <span class="spacer"></span>
      <a href="/">← Home</a>
      <a href="compose.html?kind=course">✏️ New review</a>
    </div>
  </div>

  <main id="main"><div class="loading">Loading…</div></main>

  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-viewer.js"></script>
  <script>
    function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
    function fmtDate(iso){if(!iso)return"";const d=new Date(iso);return d.toLocaleDateString(undefined,{year:"numeric",month:"long",day:"numeric"});}
    function stars(n){const r=Math.max(0,Math.min(5,Math.round(Number(n)||0)));return '<span class="stars">'+"★".repeat(r)+'<span class="empty">'+"☆".repeat(5-r)+'</span></span>';}
    function verdictBlock(r){
      const rec = r.would_recommend;
      let cls="mixed", text=r.verdict || "See pros and cons.";
      if (rec==="yes" || rec===true) { cls="yes"; if(!r.verdict) text="Would recommend."; }
      else if (rec==="no" || rec===false) { cls="no"; if(!r.verdict) text="Would not recommend."; }
      return `<div class="verdict ${cls}">${esc(text)}</div>`;
    }

    (async function () {
      const u = new URL(location.href);
      const slug = u.searchParams.get("slug") || u.pathname.replace(/^\/r\//, "");
      if (!slug) { document.getElementById("main").innerHTML="<p>Missing review.</p>"; return; }
      // We don't know if it's course or equipment — try both
      let r = null, kind = null;
      for (const k of ["course","equipment"]) {
        const res = await fetch("/api/get?kind="+k+"&slug="+encodeURIComponent(slug));
        if (res.ok) { r = await res.json(); kind = k; break; }
      }
      if (!r) { document.getElementById("main").innerHTML="<h1>Not found</h1><p>This review doesn't exist yet.</p>"; return; }
      document.title = r.title + " — EndoWiki";

      const factKeys = kind === "course"
        ? [["Provider", r.provider], ["Instructor", r.instructor], ["Location", r.location], ["Format", r.format], ["Duration", r.duration], ["Price", r.price]]
        : [["Brand", r.brand], ["Model", r.model], ["Category", r.category], ["Price", r.price], ["Used for", r.duration_used]];
      const facts = factKeys
        .filter(([,v]) => v && String(v).trim() !== "")
        .map(([k,v]) => `<div><span class="k">${esc(k)}</span><span class="v">${esc(v)}</span></div>`)
        .join("");

      const pros = (r.pros||[]).map(p=>`<li>${esc(p)}</li>`).join("");
      const cons = (r.cons||[]).map(c=>`<li>${esc(c)}</li>`).join("");

      const main = document.getElementById("main");
      main.innerHTML = `
        <div class="review-hero">
          <div class="head">
            <div>
              <h1>${esc(r.title)}<span class="kind-tag ${kind}">${kind}</span></h1>
              <div class="meta"><span class="author-chip">✍️ ${esc(r.author_name)}</span> · Updated ${fmtDate(r.updated_at)}</div>
            </div>
            <div>${stars(r.rating)}</div>
          </div>
          ${facts ? `<div class="facts">${facts}</div>` : ""}
          ${(pros || cons) ? `
            <div class="proscons">
              <div class="pros"><h4>What's good</h4><ul>${pros || "<li>—</li>"}</ul></div>
              <div class="cons"><h4>What's not</h4><ul>${cons || "<li>—</li>"}</ul></div>
            </div>` : ""}
          ${verdictBlock(r)}
        </div>
        <div class="body-host" id="body"></div>
      `;
      if (r.body) {
        const viewer = toastui.Editor.factory({
          el: document.createElement("div"),
          viewer: true,
          initialValue: r.body,
        });
        document.getElementById("body").innerHTML = viewer.getHTML();
      }
    })();
  </script>
</body>
</html>
