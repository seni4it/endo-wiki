<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading… — EndoWiki</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%238B2B2B'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='20' fill='white'%3EE%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,300;1,8..60,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" />
  <link rel="stylesheet" href="assets/styles.css" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js" defer></script>
  <script src="assets/chrome.js" defer></script>
  <script src="assets/auth.js" defer></script>
</head>
<body>

  <nav id="site-nav"></nav>

  <main id="main">
    <div class="article-page">
      <div class="loading-state" role="status" aria-live="polite">
        <div class="loading-spinner" aria-hidden="true"></div>
        <span>Loading article…</span>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <!-- Toast UI viewer -->
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-viewer.js"></script>
  <!-- Citation widget -->
  <script src="assets/cite.js"></script>

  <script>
  (function () {
    function esc(s) {
      return String(s || '').replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
    function fmtDate(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
    }
    function initials(name) {
      return String(name || '?').split(' ').map(function(w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
    }

    var slug = new URLSearchParams(location.search).get('slug') ||
               location.pathname.replace(/^\/a\//, '');

    var mainEl = document.getElementById('main');

    if (!slug) {
      mainEl.innerHTML = '<div class="article-page"><h1>Missing article</h1><p><a href="/">← Back to home</a></p></div>';
      return;
    }

    fetch('/api/get?kind=article&slug=' + encodeURIComponent(slug))
      .then(function(res) {
        if (res.status === 404) throw { notFound: true };
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function(a) {
        document.title = a.title + ' — EndoWiki';

        mainEl.innerHTML =
          '<div class="article-page">' +
            // Breadcrumb
            '<nav class="breadcrumb" aria-label="Breadcrumb">' +
              '<a href="/">EndoWiki</a>' +
              '<span class="sep" aria-hidden="true">›</span>' +
              '<a href="/#articles">Articles</a>' +
              '<span class="sep" aria-hidden="true">›</span>' +
              '<span aria-current="page">' + esc(a.title) + '</span>' +
            '</nav>' +

            // Header
            '<header class="article-header">' +
              '<span class="article-category-tag">Clinical Article</span>' +
              '<h1 class="article-title anim-fade-up">' + esc(a.title) + '</h1>' +
              (a.summary ? '<p class="article-summary anim-fade-up anim-delay-1">' + esc(a.summary) + '</p>' : '') +
              '<div class="article-byline anim-fade-up anim-delay-2">' +
                '<div class="byline-avatar" aria-hidden="true">' + esc(initials(a.author_name)) + '</div>' +
                '<div class="byline-info">' +
                  '<span class="byline-name">' + esc(a.author_name || 'EndoWiki contributor') + '</span>' +
                  (a.updated_at ? '<span class="byline-date">Updated ' + fmtDate(a.updated_at) + '</span>' : '') +
                '</div>' +
              '</div>' +
            '</header>' +

            // Body placeholder
            '<div class="article-body anim-fade-up anim-delay-3" id="article-body"></div>' +

            // Citation slot
            '<div id="cite-slot" class="anim-fade-up anim-delay-3"></div>' +

            // Footer
            '<footer style="margin-top:3em;padding-top:1.5em;border-top:1px solid var(--divider);font-family:var(--font-ui);font-size:13px;color:var(--ink-faint);">' +
              '<p>Found something to improve? <a href="compose.html?kind=article" style="color:var(--oxblood);font-weight:600;">Submit a correction or addition →</a></p>' +
            '</footer>' +
          '</div>';

        // Render the markdown body.
        // The viewer-only CDN bundle exposes `toastui.Editor` as a class that
        // renders directly into its `el`. No `.factory()` or `getHTML()` needed.
        if (a.body) {
          var bodyEl = document.getElementById('article-body');
          try {
            new toastui.Editor({ el: bodyEl, initialValue: a.body });
          } catch (e) {
            console.error('Markdown render failed:', e);
            bodyEl.textContent = a.body;
          }
        }

        // Render citation widget
        if (typeof renderCitation === 'function') {
          a.kind = 'article';
          renderCitation(document.getElementById('cite-slot'), a, location.href);
        }
      })
      .catch(function(err) {
        var notFound = err && err.notFound;
        document.title = (notFound ? 'Not found' : 'Error') + ' — EndoWiki';
        mainEl.innerHTML =
          '<div class="article-page">' +
            '<nav class="breadcrumb"><a href="/">EndoWiki</a> <span class="sep">›</span> Articles</nav>' +
            '<h1 class="article-title">' + (notFound ? 'Article not found' : 'Something went wrong') + '</h1>' +
            '<p style="font-family:var(--font-body);font-size:17px;color:var(--ink-muted);">' +
              (notFound ? 'This article doesn\'t exist yet.' : esc(err.message)) +
            '</p>' +
            '<p><a href="/" style="color:var(--oxblood);">← Back to home</a></p>' +
          '</div>';
      });
  })();
  </script>

</body>
</html>
