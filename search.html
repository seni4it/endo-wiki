<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Search — EndoWiki</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%238B2B2B'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='20' fill='white'%3EE%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,300;1,8..60,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" />
  <link rel="stylesheet" href="assets/styles.css" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js" defer></script>
  <script src="assets/chrome.js" defer></script>
  <script src="assets/auth.js" defer></script>
  <style>
    .search-page { max-width: 780px; margin: 0 auto; padding: var(--s8) var(--s6) var(--s10); }
    .search-form {
      display: flex; gap: var(--s2); margin-bottom: var(--s6);
    }
    .search-form input[type="search"] {
      flex: 1;
      padding: 14px 18px;
      border: 1px solid var(--border-dk);
      border-radius: var(--r-md);
      font-family: var(--font-body);
      font-size: 17px;
      color: var(--ink);
      background: white;
      box-shadow: var(--shadow-xs);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-form input[type="search"]:focus {
      outline: none;
      border-color: var(--oxblood);
      box-shadow: 0 0 0 3px rgba(139, 43, 43, 0.12);
    }
    .search-form button {
      padding: 14px 22px;
      background: var(--ink);
      color: white;
      border: 1px solid var(--ink);
      border-radius: var(--r-md);
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
    }
    .search-form button:hover { background: #0f1826; }

    .kind-filter {
      display: flex; gap: var(--s2); margin-bottom: var(--s5); flex-wrap: wrap;
    }
    .kind-filter button {
      padding: 6px 14px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .kind-filter button:hover { border-color: var(--ink); color: var(--ink); }
    .kind-filter button.active {
      background: var(--ink);
      border-color: var(--ink);
      color: white;
    }

    .results-meta {
      color: var(--ink-muted);
      font-family: var(--font-ui);
      font-size: 13px;
      margin-bottom: var(--s5);
    }
    .result {
      display: block;
      padding: var(--s5) 0;
      border-bottom: 1px solid var(--divider);
      text-decoration: none;
      color: inherit;
    }
    .result:hover .result-title { color: var(--oxblood); }
    .result-head {
      display: flex; align-items: center; gap: var(--s3); margin-bottom: 4px; flex-wrap: wrap;
    }
    .result-kind {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 10px;
      border-radius: 999px;
    }
    .result-kind.article { background: #e8eef6; color: #1a2438; }
    .result-kind.course { background: #e6f1e9; color: #1c6b45; }
    .result-kind.equipment { background: #f3e8d9; color: #8a5a17; }
    .result-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.2;
      transition: color 0.15s;
    }
    .result-meta {
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--ink-muted);
      margin: 4px 0 10px;
    }
    .result-snippet {
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink-muted);
    }
    .result-snippet mark {
      background: #fff3c2;
      color: var(--ink);
      padding: 0 2px;
      border-radius: 2px;
    }
    .result-stars {
      color: #d49b1a;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .empty-state, .loading-state {
      text-align: center;
      padding: var(--s9) var(--s5);
      color: var(--ink-muted);
      font-family: var(--font-ui);
    }
    .empty-state p { margin: var(--s2) 0; font-size: 15px; }
    .empty-state .big { font-size: 20px; color: var(--ink); margin-bottom: var(--s4); font-family: var(--font-display); }
    .loading-state .spinner {
      display: inline-block; width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--oxblood);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: var(--s3);
      vertical-align: -6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <nav id="site-nav"></nav>

  <main class="search-page">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="/">EndoWiki</a>
      <span class="sep" aria-hidden="true">›</span>
      <span aria-current="page">Search</span>
    </nav>

    <h1 style="font-family:var(--font-display);font-size:32px;font-weight:600;letter-spacing:-0.01em;margin:0 0 var(--s4);">Search the wiki</h1>

    <form class="search-form" id="search-form" role="search">
      <label for="q" class="visually-hidden" style="position:absolute;left:-9999px;">Search query</label>
      <input
        type="search"
        id="q"
        name="q"
        placeholder="Try 'hypochlorite', 'apex locator', 'calcified canals'…"
        autocomplete="off"
        autofocus
      />
      <button type="submit">Search</button>
    </form>

    <div class="kind-filter" role="tablist" aria-label="Filter by content type">
      <button type="button" class="active" data-kind="">All</button>
      <button type="button" data-kind="article">Articles</button>
      <button type="button" data-kind="course">Courses</button>
      <button type="button" data-kind="equipment">Equipment</button>
    </div>

    <div id="results"></div>
  </main>

  <footer id="site-footer"></footer>

  <script>
    (function () {
      function esc(s) {
        return String(s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      }
      function highlight(text, q) {
        if (!q || !text) return esc(text);
        const tokens = q.toLowerCase().split(/\s+/).filter(t => t.length > 1);
        if (tokens.length === 0) return esc(text);
        const escaped = esc(text);
        const escapedLower = escaped.toLowerCase();
        let out = "";
        let i = 0;
        while (i < escaped.length) {
          let matchLen = 0;
          for (const t of tokens) {
            if (escapedLower.substring(i, i + t.length) === t) {
              matchLen = Math.max(matchLen, t.length);
            }
          }
          if (matchLen > 0) {
            out += "<mark>" + escaped.substring(i, i + matchLen) + "</mark>";
            i += matchLen;
          } else {
            out += escaped[i];
            i++;
          }
        }
        return out;
      }
      function stars(n) {
        const r = Math.max(0, Math.min(5, Math.round(Number(n) || 0)));
        return '<span class="result-stars">' + "★".repeat(r) + "</span>";
      }

      const form = document.getElementById("search-form");
      const qInput = document.getElementById("q");
      const resultsEl = document.getElementById("results");
      const filterBtns = document.querySelectorAll(".kind-filter button");
      let currentKind = "";

      function renderResults(data, q) {
        if (!data.results || data.results.length === 0) {
          resultsEl.innerHTML = `
            <div class="empty-state">
              <p class="big">No matches for "${esc(q)}"</p>
              <p>Try a different term, or ${data.note ? esc(data.note) : "use more specific wording"}.</p>
              <p style="margin-top: var(--s5);"><a href="compose.html" style="color:var(--oxblood);font-weight:600;">Write an article on this topic →</a></p>
            </div>`;
          return;
        }
        const hits = data.results.map((r) => {
          const href = r.kind === "article" ? `/a/${r.slug}` : `/r/${r.slug}`;
          return `
            <a class="result" href="${href}">
              <div class="result-head">
                <span class="result-kind ${r.kind}">${r.kind}</span>
                <span class="result-title">${highlight(r.title, q)}</span>
                ${r.rating ? stars(r.rating) : ""}
              </div>
              <div class="result-meta">
                By ${esc(r.author_name || "Community")}
              </div>
              ${r.snippet ? `<div class="result-snippet">${highlight(r.snippet, q)}</div>` : ""}
            </a>`;
        }).join("");
        resultsEl.innerHTML =
          `<div class="results-meta">${data.total} result${data.total === 1 ? "" : "s"} for "${esc(q)}"</div>` + hits;
      }

      async function doSearch(q) {
        if (!q || !q.trim()) {
          resultsEl.innerHTML = `
            <div class="empty-state">
              <p class="big">Start typing to search</p>
              <p>Search covers titles, summaries, and full article bodies.</p>
            </div>`;
          return;
        }
        resultsEl.innerHTML = `<div class="loading-state"><span class="spinner"></span>Searching…</div>`;
        try {
          const url = "/api/search?q=" + encodeURIComponent(q) + (currentKind ? "&kind=" + currentKind : "");
          const res = await fetch(url);
          if (!res.ok) throw new Error("HTTP " + res.status);
          const data = await res.json();
          renderResults(data, q);
        } catch (e) {
          resultsEl.innerHTML = `<div class="empty-state"><p class="big">Search failed</p><p>${esc(e.message)}. Please try again.</p></div>`;
        }
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const q = qInput.value.trim();
        const newUrl = new URL(location.href);
        if (q) newUrl.searchParams.set("q", q);
        else newUrl.searchParams.delete("q");
        if (currentKind) newUrl.searchParams.set("kind", currentKind);
        else newUrl.searchParams.delete("kind");
        history.replaceState(null, "", newUrl);
        doSearch(q);
      });

      filterBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          filterBtns.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentKind = btn.dataset.kind;
          const q = qInput.value.trim();
          if (q) doSearch(q);
        });
      });

      // Initial state from URL
      const initialQ = new URLSearchParams(location.search).get("q") || "";
      const initialKind = new URLSearchParams(location.search).get("kind") || "";
      if (initialKind) {
        const b = document.querySelector('.kind-filter button[data-kind="' + initialKind + '"]');
        if (b) {
          filterBtns.forEach((x) => x.classList.remove("active"));
          b.classList.add("active");
          currentKind = initialKind;
        }
      }
      qInput.value = initialQ;
      if (initialQ) doSearch(initialQ);
      else doSearch("");
    })();
  </script>
</body>
</html>
