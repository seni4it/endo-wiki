# Decap CMS configuration for EndoWiki
# Docs: https://decapcms.org/docs/configuration-options/

backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: "Create {{collection}} “{{slug}}”"
    update: "Update {{collection}} “{{slug}}”"
    delete: "Delete {{collection}} “{{slug}}”"
    uploadMedia: "Upload “{{path}}”"
    deleteMedia: "Delete “{{path}}”"

# After first push, set this to the raw GitHub URL base so previews resolve images.
site_url: https://seni4it.github.io/endo-wiki/
display_url: https://seni4it.github.io/endo-wiki/
logo_url: /assets/logo.svg

media_folder: assets/uploads
public_folder: /assets/uploads

# Make the editor show a rendered preview alongside markdown
editor:
  preview: true

collections:
  # -------------------------------------------------------------------
  # Clinical articles
  # -------------------------------------------------------------------
  - name: articles
    label: "Articles"
    label_singular: "Article"
    folder: articles
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short summary (1-2 sentences)", name: "summary", widget: "text", required: false }
      - { label: "Tags (comma-separated)", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # -------------------------------------------------------------------
  # Course reviews
  # -------------------------------------------------------------------
  - name: course-reviews
    label: "Course reviews"
    label_singular: "Course review"
    folder: reviews/courses
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}} — ★{{rating}} — by {{author}}"
    fields:
      - { label: "Title (course name)", name: "title", widget: "string" }
      - label: "Rating (stars)"
        name: "rating"
        widget: "select"
        options: ["1", "2", "3", "4", "5"]
        default: "4"
      - { label: "Your name", name: "author", widget: "string" }
      - { label: "Date of review (YYYY-MM)", name: "date", widget: "string", hint: "e.g., 2026-03" }
      - { label: "Provider (institution or company)", name: "provider", widget: "string" }
      - { label: "Instructor(s)", name: "instructor", widget: "string", required: false }
      - { label: "Location (or 'Online')", name: "location", widget: "string", required: false }
      - label: "Format"
        name: "format"
        widget: "select"
        options:
          - "In-person hands-on"
          - "In-person lecture"
          - "Online live"
          - "Online self-paced"
          - "Hybrid"
      - { label: "Duration (e.g., '5 days', '25 hours', '6 months')", name: "duration", widget: "string", required: false }
      - { label: "Price (approximate, include currency)", name: "price", widget: "string", required: false }
      - { label: "When you took it (YYYY-MM)", name: "date_taken", widget: "string", required: false }
      - label: "Pros"
        name: "pros"
        widget: "list"
        field: { label: "Pro", name: "item", widget: "string" }
      - label: "Cons"
        name: "cons"
        widget: "list"
        field: { label: "Con", name: "item", widget: "string" }
      - label: "Would you recommend?"
        name: "would_recommend"
        widget: "select"
        options: ["yes", "no", "mixed"]
        default: "yes"
      - { label: "One-sentence verdict", name: "verdict", widget: "string" }
      - { label: "Full review body (context, details, story)", name: "body", widget: "markdown" }

  # -------------------------------------------------------------------
  # Equipment reviews
  # -------------------------------------------------------------------
  - name: equipment-reviews
    label: "Equipment reviews"
    label_singular: "Equipment review"
    folder: reviews/equipment
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}} — ★{{rating}} — by {{author}}"
    fields:
      - { label: "Title (e.g., 'Brand Model')", name: "title", widget: "string" }
      - label: "Rating (stars)"
        name: "rating"
        widget: "select"
        options: ["1", "2", "3", "4", "5"]
        default: "4"
      - { label: "Your name", name: "author", widget: "string" }
      - { label: "Date of review (YYYY-MM)", name: "date", widget: "string", hint: "e.g., 2026-03" }
      - { label: "Brand", name: "brand", widget: "string" }
      - { label: "Model", name: "model", widget: "string", required: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Apex locator"
          - "Endomotor"
          - "Microscope"
          - "File system"
          - "Obturation"
          - "Irrigation"
          - "Imaging"
          - "Other"
        default: "Other"
      - { label: "Price (approximate, include currency & region)", name: "price", widget: "string", required: false }
      - { label: "When you bought it (YYYY-MM)", name: "date_bought", widget: "string", required: false }
      - { label: "How long you've used it", name: "duration_used", widget: "string", required: false, hint: "e.g., '6 months of daily use'" }
      - label: "Pros"
        name: "pros"
        widget: "list"
        field: { label: "Pro", name: "item", widget: "string" }
      - label: "Cons"
        name: "cons"
        widget: "list"
        field: { label: "Con", name: "item", widget: "string" }
      - label: "Would you recommend?"
        name: "would_recommend"
        widget: "select"
        options: ["yes", "no", "mixed"]
        default: "yes"
      - { label: "One-sentence verdict", name: "verdict", widget: "string" }
      - { label: "Full review body (context, comparison, reliability)", name: "body", widget: "markdown" }

  # -------------------------------------------------------------------
  # Meta pages (home, sidebar, help)
  # -------------------------------------------------------------------
  - name: meta
    label: "Meta pages"
    label_singular: "Meta page"
    delete: false
    files:
      - label: "Home page"
        name: "home"
        file: "README.md"
        fields:
          - { label: "Content", name: "body", widget: "markdown" }
      - label: "Sidebar navigation"
        name: "sidebar"
        file: "_sidebar.md"
        fields:
          - { label: "Sidebar markdown", name: "body", widget: "markdown" }
      - label: "Top navbar"
        name: "navbar"
        file: "_navbar.md"
        fields:
          - { label: "Navbar markdown", name: "body", widget: "markdown" }
      - label: "Contributing guide"
        name: "contributing"
        file: "contributing.md"
        fields:
          - { label: "Content", name: "body", widget: "markdown" }
      - label: "Editorial guidelines"
        name: "editorial"
        file: "editorial-guidelines.md"
        fields:
          - { label: "Content", name: "body", widget: "markdown" }
